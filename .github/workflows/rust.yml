name: Rust Build, Test, and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # Limit parallel jobs to prevent OOM on standard GitHub runners
  ZVEC_BUILD_PARALLEL: 2

permissions:
  pull-requests: write
  contents: write

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libssl-dev clang libgflags-dev libgoogle-glog-dev protobuf-compiler libprotobuf-dev libyaml-cpp-dev

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.7

    - name: Set up Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: "true"

    - name: Check formatting
      env:
        SCCACHE_GHA_ENABLED: "true"
        RUSTC_WRAPPER: "sccache"
      run: cargo fmt -- --check

    - name: Build Workspace
      env:
        SCCACHE_GHA_ENABLED: "true"
        RUSTC_WRAPPER: "sccache"
      run: cargo build --verbose

    - name: Run Tests
      env:
        SCCACHE_GHA_ENABLED: "true"
        RUSTC_WRAPPER: "sccache"
      run: cargo test --verbose

    - name: Run Examples
      env:
        SCCACHE_GHA_ENABLED: "true"
        RUSTC_WRAPPER: "sccache"
      run: cargo run --example simple_example

  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    needs: build_and_test
    # Only run release-plz on push to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev clang libgflags-dev libgoogle-glog-dev protobuf-compiler libprotobuf-dev libyaml-cpp-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
